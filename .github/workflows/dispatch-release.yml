name: Dispatch release

on:
  workflow_dispatch:
    inputs:
      prerelease:
        description: 'Prerelease type'
        required: false
        default: stable
        type: choice
        options:
          - stable
          - alpha

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  check:
    name: Run checks
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/check-pr.yml
    with:
      skip-deduplication: true

  release:
    name: Run release
    needs: check
    if: ${{ !cancelled() && (github.ref != 'refs/heads/master' || needs.check.result == 'success') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.PAT }}
          fetch-depth: 0
          fetch-tags: true
      - name: Prepare workflow
        uses: ./.github/actions/prepare
      - name: Configure git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      - name: Release
        run: ${{ case(inputs.prerelease == 'alpha', 'pnpm release:alpha', 'pnpm release') }}
      - name: Push
        run: pnpm push
