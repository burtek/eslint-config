name: Check PR

on:
  workflow_call:
    inputs:
      skip-deduplication:
        required: false
        type: boolean
  pull_request:
    branches:
      - master

jobs:
  test-pr:
    name: Test PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Prepare workflow
        uses: ./.github/actions/prepare
      - name: Test configs
        run: pnpm test

  lint-pr:
    name: Lint PR
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Prepare workflow
        uses: ./.github/actions/prepare
      - name: Lint configs
        run: pnpm lint

  check-deps:
    name: Check deps deduplication
    runs-on: ubuntu-latest
    if: ${{ !inputs.skip-deduplication }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v7
      - name: Prepare workflow
        uses: ./.github/actions/prepare
      - name: Deduplicate dependencies
        run: pnpm dedupe --check
      - name: Notify of duplicates
        uses: actions/github-script@v9
        with:
          script: |
            var comments = await github.rest.issues.listComments({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            if (!comments.data.find(c => c.body.includes('is not deduplicated. You can try deduplicating'))) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: '`pnpm-lock.yaml` is not deduplicated. You can try deduplicating dependencies using `/deduplicate` command'
              })
            }
        if: failure()
