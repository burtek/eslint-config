name: Run pnpm dedupe on PR Command

on:
  issue_comment:
    types: [created]

jobs:
  run-pnpm-dedupe:
    if: ${{ github.event.issue.pull_request && github.event.comment.author_association == 'OWNER' && github.event.comment.body == '/deduplicate' }}
    runs-on: ubuntu-latest

    steps:
      - name: Acknowlegde command and get ref
        uses: actions/github-script@v9
        id: github-script
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Ok, trying to deduplicate'
            });
            var pull = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number
            });
            return pull.data.head.ref;

      - name: Check out the repository
        uses: actions/checkout@v7
        with:
          ref: ${{ fromJson(steps.github-script.outputs.result) }}
          persist-credentials: false

      - name: 'Prepare workflow'
        uses: ./.github/actions/prepare

      - name: 'Deduplicate dependencies'
        run: pnpm dedupe

      - name: Commit changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(deps): Deduplicated dependencies using pnpm dedupe"

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.PAT }}
          branch: ${{ fromJson(steps.github-script.outputs.result) }}

      - name: Notify of failure
        uses: actions/github-script@v9
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'I failed :('
            })
        if: failure()
